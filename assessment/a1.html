<!DOCTYPE html>
<html>
<head>
<title>Student Marks System</title>
<link rel="stylesheet" href="a1.css">
</head>

<body>

<div class="container">

<h2>Student Marks System</h2>

<input type="text" id="name" placeholder="Student Name"><br>
<input type="text" id="roll" placeholder="Roll Number"><br>
<input type="number" id="math" placeholder="Math Marks"><br>
<input type="number" id="science" placeholder="Science Marks"><br>
<input type="number" id="english" placeholder="English Marks"><br><br>

<button onclick="addStudent()">Add Student</button>
<button onclick="totalmarks()">Total Marks</button>
<button onclick="averagemarks()">Average Marks</button>
<button onclick="displayStudents()">Display All</button>
<button onclick="showAbove80()">Above 80 Avg</button>
<button onclick="showFailed()">Failed Students</button>
<button onclick="countStudents()">Total Students</button>

<div id="result"></div>

</div>

<script src="a1.js"></script>

</body>
</html>
